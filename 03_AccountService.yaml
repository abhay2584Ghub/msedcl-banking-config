spring:
    application:
        name: "03_AccountService"
    datasource:
        username: root
        password: root123
        url: jdbc:mysql://localhost:3306/accounts_db
        driver-class-name: com.mysql.cj.jdbc.Driver
    profiles:
        active:
            - "prod"
    config:
        import: "configserver:http://localhost:8787"
        profiles:
        active:
            - "prod"
