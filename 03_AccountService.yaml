    api-docs:
        enabled: false

logging:
    file:
        name: logs/account.log

server:
    port: 8181

#Custome Properties - User in application
build:
    version: "4.0"
accounts:
    message: "Welcome to MSEDCL bank Account related REST API"
    contactDetails:
        name: "Sunil"
        email: "Sunil@msedcl.com"
    onCallSupport:
        - 1234567890
        - 9876543210
